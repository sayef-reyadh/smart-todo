name: Deploy Backend (CDK)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'

# GitHub Actions secrets required (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID       IAM user with CDK deploy permissions
#   AWS_SECRET_ACCESS_KEY   IAM user secret
#   JWT_SECRET_KEY          JWT signing secret
#   PASSWORD_PEPPER         Password hashing pepper

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK Python deps
        working-directory: infra
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-2

      - name: CDK Deploy
        working-directory: infra
        # All secrets are passed as env vars → CDK reads via os.environ → Lambda env
        env:
          JWT_SECRET_KEY:    ${{ secrets.JWT_SECRET_KEY }}
          PASSWORD_PEPPER:   ${{ secrets.PASSWORD_PEPPER }}
          CORS_ORIGINS_RAW:  ${{ secrets.CORS_ORIGINS_RAW }}
        run: |
          source .venv/bin/activate
          cdk deploy SmartTodoStack --require-approval never --outputs-file cdk-outputs.json

      - name: Print API URL to job summary
        working-directory: infra
        run: |
          API_URL=$(python3 -c "import json; d=json.load(open('cdk-outputs.json')); print(d['SmartTodoStack']['ApiUrl'])")
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Gateway URL | \`${API_URL}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **VITE_API_BASE_URL** | \`${API_URL}/api\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Copy the **VITE_API_BASE_URL** value into GitHub Actions secrets and Vercel environment variables." >> $GITHUB_STEP_SUMMARY

