name: Build Check — Frontend

# Vercel deploys automatically via its native GitHub integration.
# This workflow only runs a build check to catch errors before Vercel picks it up.
#
# Vercel setup (one-time):
#   1. vercel.com/new → import sayef-reyadh/smart-todo
#   2. Set root directory: frontend
#   3. Add environment variable: VITE_API_BASE_URL = <CDK ApiUrl output>

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

