name: Destroy Backend (CDK)

# MANUAL TRIGGER ONLY — this permanently deletes all AWS resources including DynamoDB data.
# Go to: Actions tab → "Destroy Backend (CDK)" → Run workflow

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY to confirm — this deletes all tables and data permanently'
        required: true

jobs:
  destroy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DESTROY'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK Python deps
        working-directory: infra
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-2

      - name: CDK Destroy
        working-directory: infra
        env:
          JWT_SECRET_KEY:  ${{ secrets.JWT_SECRET_KEY }}
          PASSWORD_PEPPER: ${{ secrets.PASSWORD_PEPPER }}
        run: |
          source .venv/bin/activate
          cdk destroy SmartTodoStack --force
